<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="MCP Site Manager">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="128" y1="128" x2="128" y2="56"/>
    <line x1="128" y1="128" x2="66"  y2="164"/>
    <line x1="128" y1="128" x2="190" y2="164"/>
  </g>

  <circle cx="128" cy="56"  r="20" fill="#ffffff"/>
  <circle cx="66"  cy="164" r="20" fill="#ffffff"/>
  <circle cx="190" cy="164" r="20" fill="#ffffff"/>

  <circle cx="128" cy="128" r="34" fill="url(#hub)"/>
  <circle cx="128" cy="128" r="34" fill="none" stroke="#1d4ed8" stroke-width="3" opacity="0.25"/>

  <g fill="#1d4ed8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <text x="128" y="138" font-size="28" letter-spacing="-1">MCP</text>
  </g>
</svg>
