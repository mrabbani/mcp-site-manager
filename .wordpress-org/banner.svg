<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" role="img" aria-label="MCP Site Manager — Manage WordPress from any MCP client">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1544" height="500" fill="url(#bg)"/>
  <rect width="1544" height="500" fill="url(#dots)"/>
  <ellipse cx="320" cy="250" rx="520" ry="360" fill="url(#glow)"/>

  <g transform="translate(320 250)">
    <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55">
      <line x1="0" y1="0" x2="-180" y2="-120"/>
      <line x1="0" y1="0" x2="180"  y2="-120"/>
      <line x1="0" y1="0" x2="-180" y2="120"/>
      <line x1="0" y1="0" x2="180"  y2="120"/>
      <line x1="0" y1="0" x2="0"    y2="-180"/>
      <line x1="0" y1="0" x2="0"    y2="180"/>
    </g>

    <g fill="#ffffff" opacity="0.95">
      <circle cx="-180" cy="-120" r="18"/>
      <circle cx="180"  cy="-120" r="18"/>
      <circle cx="-180" cy="120"  r="18"/>
      <circle cx="180"  cy="120"  r="18"/>
      <circle cx="0"    cy="-180" r="22"/>
      <circle cx="0"    cy="180"  r="22"/>
    </g>

    <circle r="78" fill="url(#hub)"/>
    <circle r="78" fill="none" stroke="#1d4ed8" stroke-width="3" opacity="0.20"/>
    <text x="0" y="12" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-weight="800" font-size="42" fill="#1d4ed8" letter-spacing="-1.5">MCP</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="700" y="210" font-size="76" font-weight="800" letter-spacing="-2">MCP Site Manager</text>
    <text x="700" y="270" font-size="28" font-weight="500" opacity="0.92" letter-spacing="0.2">
      Manage WordPress from Claude, ChatGPT, Cursor, and any MCP client.
    </text>

    <g transform="translate(700 320)" font-size="22" font-weight="600">
      <g>
        <rect x="0" y="0" width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.35"/>
        <text x="90" y="29" text-anchor="middle">~74 abilities</text>
      </g>
      <g transform="translate(200 0)">
        <rect x="0" y="0" width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.35"/>
        <text x="110" y="29" text-anchor="middle">HTTP + STDIO transport</text>
      </g>
      <g transform="translate(440 0)">
        <rect x="0" y="0" width="200" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.35"/>
        <text x="100" y="29" text-anchor="middle">Capability-gated</text>
      </g>
    </g>

    <text x="700" y="430" font-size="20" font-weight="500" opacity="0.75" letter-spacing="0.3">
      Posts · Media · Plugins · Themes · Menus · Diagnostics · Maintenance
    </text>
  </g>
</svg>
